name: Autowini Scraper

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch: 

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
      - name: Get Scraper Code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # აი ეს ნაბიჯი არის აუცილებელი Puppeteer-ისთვის Linux-ზე:
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget gnupg libnss3 libatk-bridge2.0-0 libgtk-3-0 libasound2

      - name: Install Node Packages
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth axios
      
      - name: Run Magic Script
        run: node scraper.js